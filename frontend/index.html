<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Create a Party</title>
</head>
<body>
<h1>Create a Watch Party</h1>
<form id="createPartyForm">
    <label for="partyName">Party Name:</label>
    <input id="partyName" name="partyName" required type="text">

    <label for="adminName">Admin Name:</label>
    <input id="adminName" name="adminName" required type="text">

    <label for="password">Password:</label>
    <input id="password" name="password" type="password">

    <button type="submit">Create Party</button>
</form>

<script>
    document.getElementById('createPartyForm').addEventListener('submit', async (event) => {
        event.preventDefault();

        const partyName = document.getElementById('partyName').value;
        const adminName = document.getElementById('adminName').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('http://localhost:3000/create-party', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({name: partyName, adminName: adminName, password: password})
            });

            const result = await response.json();
            alert(result.message || 'Party created successfully!');
        } catch (error) {
            console.error('Error creating party:', error);
            alert('Failed to create party.');
        }
    });
</script>

<h2>Rank Movies</h2>
<div id="movieList">
    <!-- Movie list will be dynamically populated here -->
</div>
<button disabled id="submitVote">Submit Vote</button>


</body>
</html>
